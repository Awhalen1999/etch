<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark">
    <title>etch</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div id="app">
        <header id="hud" aria-label="status">
            <span class="hud-name" id="hud-name">—</span>
            <span class="hud-sep">·</span>
            <span class="hud-slot">depth <span id="hud-depth">—</span></span>
            <span class="hud-sep">·</span>
            <span class="hud-slot">stamina <span id="hud-stamina">—</span></span>
            <span class="hud-sep">·</span>
            <span class="hud-slot">deepest <span id="hud-deepest">—</span></span>
        </header>

        <main id="scroll" aria-live="polite"></main>

        <footer id="bottom">
            <form id="input-form" autocomplete="off" spellcheck="false">
                <span class="prompt">&gt;</span>
                <input id="input" type="text" autofocus aria-label="command input">
            </form>
            <span class="hud-band" id="hud-band">—</span>
        </footer>
    </div>

    <script src="/app.js"></script>
</body>
</html>
